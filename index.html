				<span class="home-video-trigger__icon" aria-hidden="true">&#9654;</span>

				<button type="button" id="homeVideoClose" class="home-video-modal__close" aria-label="Chiudi video">&times;</button>

				<div class="home-video-modal__frame">

				</div>
				<p id="homeVideoFallback" class="home-video-modal__fallback">Se il video non parte, <a href="https://www.youtube.com/watch?v=hbZbUpaUTGI" target="_blank" rel="noopener noreferrer">guardalo su YouTube</a>.</p>

	<button type="button" id="tornaSu" class="torna-su" aria-label="Torna in alto">&#8593;</button>

	<script type="text/javascript">
	(function () {
		var videoTrigger = document.getElementById('homeVideoTrigger');
		var videoModal = document.getElementById('homeVideoModal');
		var videoClose = document.getElementById('homeVideoClose');
		var videoBackdrop = document.getElementById('homeVideoBackdrop');
		var videoFrame = document.getElementById('homeVideoFrame');
		var videoFrameContainer = videoFrame ? videoFrame.parentNode : null;
		var videoFallback = document.getElementById('homeVideoFallback');
		var videoSrc = 'https://www.youtube-nocookie.com/embed/hbZbUpaUTGI?autoplay=1&rel=0';
		var videoFallbackTimer = null;
		var lastFocusedElement = null;

		function elementiFocusabili(contenitore) {
			if (!contenitore || !contenitore.querySelectorAll) {
				return [];
			}
			return contenitore.querySelectorAll('button, [href], iframe, input, select, textarea, [tabindex]:not([tabindex="-1"])');
		}

		function intrappolaFocusNelModal(eventoTastiera) {
			var pannello = videoModal ? videoModal.getElementsByClassName('home-video-modal__panel') : [];
			var focusabili;
			var primo;
			var ultimo;
			if (!pannello.length || eventoTastiera.keyCode !== 9) {
				return;
			}

			focusabili = elementiFocusabili(pannello[0]);
			if (!focusabili.length) {
				eventoTastiera.preventDefault();
				pannello[0].focus();
				return;
			}

			primo = focusabili[0];
			ultimo = focusabili[focusabili.length - 1];
			if (eventoTastiera.shiftKey && document.activeElement === primo) {
				eventoTastiera.preventDefault();
				ultimo.focus();
			} else if (!eventoTastiera.shiftKey && document.activeElement === ultimo) {
				eventoTastiera.preventDefault();
				primo.focus();
			}
		}

		function apriVideo() {
			var pannello = videoModal ? videoModal.getElementsByClassName('home-video-modal__panel') : [];
			if (!videoModal || !videoFrame) {
				return;
			}
			lastFocusedElement = document.activeElement;
			if (videoFallback) {
				videoFallback.className = 'home-video-modal__fallback';
			}
			videoFrame.src = videoSrc;
			videoModal.className = 'home-video-modal home-video-modal--open';
			videoModal.setAttribute('aria-hidden', 'false');
			if (videoFallbackTimer) {
				window.clearTimeout(videoFallbackTimer);
			}
			videoFallbackTimer = window.setTimeout(function () {
				if (videoFallback) {
					videoFallback.className = 'home-video-modal__fallback home-video-modal__fallback--visible';
				}
			}, 4000);
			if (document.body.className.indexOf('lightbox-open') === -1){
				document.body.className += (document.body.className ? ' ' : '') + ' lightbox-open';
			}
			if (videoClose) {
				videoClose.focus();
			} else if (pannello.length) {
				pannello[0].focus();
			}
		}

		function chiudiVideo() {
			if (!videoModal || !videoFrame) {
				return;
			}
			if (videoFallbackTimer) {
				window.clearTimeout(videoFallbackTimer);
				videoFallbackTimer = null;
			}
			videoModal.className = 'home-video-modal';
			videoModal.setAttribute('aria-hidden', 'true');
			if (videoFrameContainer) {
				var nuovoFrame = videoFrame.cloneNode(false);
				nuovoFrame.src = '';
				videoFrameContainer.replaceChild(nuovoFrame, videoFrame);
				videoFrame = nuovoFrame;
				videoFrame.onload = function () {
					if (videoFallbackTimer) {
						window.clearTimeout(videoFallbackTimer);
						videoFallbackTimer = null;
					}
				};
			} else {
				videoFrame.src = '';
			}
			if (videoFallback) {
				videoFallback.className = 'home-video-modal__fallback';
			}
			document.body.className = document.body.className.replace(' lightbox-open', '').replace('lightbox-open', '');
			if (lastFocusedElement && lastFocusedElement.focus) {
				lastFocusedElement.focus();
			}
		}

		if (videoTrigger && videoClose && videoBackdrop) {
			videoTrigger.addEventListener('click', apriVideo, false);
			videoClose.addEventListener('click', chiudiVideo, false);
			videoBackdrop.addEventListener('click', chiudiVideo, false);
			videoFrame.onload = function () {
				if (videoFallbackTimer) {
					window.clearTimeout(videoFallbackTimer);
					videoFallbackTimer = null;
				}
			};
			document.addEventListener('keydown', function (evento) {
				var eventoTastiera = evento || window.event;
				if (videoModal && videoModal.className.indexOf('home-video-modal--open') !== -1) {
					if (eventoTastiera.keyCode === 27) {
						chiudiVideo();
						return;
					}
					intrappolaFocusNelModal(eventoTastiera);
					return;
				}
			}, false);
		}
	})();
	</script>
